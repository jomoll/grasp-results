_resume: true
agent:
  module: src.client.agents.VertexAgent
  parameters:
    location: us-central1
    max_output_tokens: 32768
    model: gemini-3.1-flash-lite-preview
    project_id: johannes-moll
    temperature: 0.0
cycle:
  batch_concurrency: 5
  epochs: 5
  run_baseline: true
  seed: 2
  update_every: 48
data:
  dev: data/medagentbench/split_dev.json
  full: data/medagentbench/new_patient_tasks.json
  id_test: data/medagentbench/split_id_test.json
  test: data/medagentbench/split_test.json
  val: data/medagentbench/split_val.json
evo_memory:
  episodic_enabled: true
  episodic_top_k: 3
  max_context_chars: 6000
  max_episodes: 500
  max_semantic_rules: 25
  semantic_enabled: true
  semantic_top_k: 8
output_dir: outputs/evo_memory_cycle
task:
  controller_address: http://localhost:5070/api
  fhir_api_base: http://localhost:8080/fhir/
  name: medagentbench-v2-skill
updater:
  module: src.client.agents.VertexAgent
  parameters:
    location: us-central1
    max_output_tokens: 32768
    model: gemini-3.1-flash-lite-preview
    project_id: johannes-moll
    temperature: 0.7
