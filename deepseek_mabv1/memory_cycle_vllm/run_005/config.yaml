_resume: true
agent:
  module: src.client.agents.HTTPAgent
  parameters:
    body:
      max_tokens: 8192
      model: deepseek-v4-flash
      temperature: 0.0
    headers:
      Authorization: Bearer sk-litellm-nicvi-sg
      Content-Type: application/json
    prompter:
      args:
        agent_role: assistant
      name: role_content_dict
    url: http://172.20.108.58:4000/chat/completions
cycle:
  batch_concurrency: 5
  epochs: 5
  run_baseline: true
  seed: 5
  update_every: 48
data:
  dev: data/medagentbench/split_dev.json
  full: data/medagentbench/test_data_v2.json
  id_test: data/medagentbench/split_id_test.json
  test: data/medagentbench/split_test.json
  val: data/medagentbench/split_val.json
memory:
  max_bullets: 200
output_dir: outputs/memory_cycle_vllm
task:
  controller_address: http://localhost:5100/api
  fhir_api_base: http://localhost:8080/fhir/
  name: medagentbench-skill
updater:
  module: src.client.agents.HTTPAgent
  parameters:
    body:
      max_tokens: 8192
      model: deepseek-v4-flash
      temperature: 0.7
    headers:
      Authorization: Bearer sk-litellm-nicvi-sg
      Content-Type: application/json
    prompter:
      args:
        agent_role: assistant
      name: role_content_dict
    url: http://172.20.108.58:4000/chat/completions
