_resume: true
agent:
  module: src.client.agents.HTTPAgent
  parameters:
    body:
      max_tokens: 8192
      model: deepseek-v4-flash
      temperature: 0.0
    headers:
      Authorization: Bearer sk-litellm-nicvi-sg
      Content-Type: application/json
    prompter:
      args:
        agent_role: assistant
      name: role_content_dict
    url: http://172.20.108.58:4000/chat/completions
cycle:
  batch_concurrency: 5
  epochs: 5
  run_baseline: true
  seed: 2
  update_every: 48
data:
  dev: data/medagentbench/split_dev.json
  full: data/medagentbench/new_patient_tasks.json
  id_test: data/medagentbench/split_id_test.json
  test: data/medagentbench/split_test.json
  val: data/medagentbench/split_val.json
evo_memory:
  episodic_enabled: true
  episodic_top_k: 3
  max_context_chars: 6000
  max_episodes: 500
  max_semantic_rules: 25
  semantic_enabled: true
  semantic_top_k: 8
output_dir: outputs/evo_memory_cycle_vllm
task:
  controller_address: http://localhost:5070/api
  fhir_api_base: http://localhost:8080/fhir/
  name: medagentbench-v2-skill
updater:
  module: src.client.agents.HTTPAgent
  parameters:
    body:
      max_tokens: 8192
      model: deepseek-v4-flash
      temperature: 0.7
    headers:
      Authorization: Bearer sk-litellm-nicvi-sg
      Content-Type: application/json
    prompter:
      args:
        agent_role: assistant
      name: role_content_dict
    url: http://172.20.108.58:4000/chat/completions
